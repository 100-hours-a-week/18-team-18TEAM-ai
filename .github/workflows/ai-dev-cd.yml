name: CD - Dev(AI)

on:
  pull_request:
    branches: [ "develop" ]
    types: [ closed ]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ai-dev-cd-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20

    env:
      APP_NAME: "BizKit-AI"
      APP_STAGE: dev
      HEALTH_URL: http://127.0.0.1:8000/ai/health
      PYTHON_VERSION: "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Dependencies (pip)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install python-semantic-release

      - name: Compile Check
        run: python -m compileall app

      - name: Semantic Release (dev)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          semantic-release -c releaserc.toml version

      - name: Read version from VERSION file
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d ' \n\r\t' < VERSION)"
          [[ -n "$VERSION" ]] || (echo "VERSION file is empty" >&2; exit 1)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials (Access Key)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install Buildah
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y buildah

      - name: Login to ECR
        shell: bash
        run: |
          set -euo pipefail
          AWS_REGION="${{ secrets.AWS_REGION }}"
          AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REPOSITORY="${{ secrets.ECR_REPOSITORY_AI_DEV }}"
          if [[ -z "${ECR_REPOSITORY}" ]]; then
            ECR_REPOSITORY="bizkit-ai-dev"
          fi
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          aws ecr get-login-password --region "${AWS_REGION}" | \
            buildah login --username AWS --password-stdin "${ECR_REGISTRY}"
          if ! aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" --region "${AWS_REGION}" >/dev/null 2>&1; then
            aws ecr create-repository --repository-name "${ECR_REPOSITORY}" --region "${AWS_REGION}" >/dev/null
          fi

          echo "ECR_REPOSITORY=${ECR_REPOSITORY}" >> "$GITHUB_ENV"
          echo "ECR_REGISTRY=${ECR_REGISTRY}" >> "$GITHUB_ENV"

      - name: Build and Push AI Container Image
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.value }}"
          IMAGE_TAG="dev-${VERSION}-${GITHUB_SHA::7}"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          if aws ecr describe-images --repository-name "${ECR_REPOSITORY}" \
            --image-ids imageTag="${IMAGE_TAG}" \
            --region "${{ secrets.AWS_REGION }}" >/dev/null 2>&1; then
            echo "Image already exists, skip build/push: ${IMAGE_URI}"
          else
            buildah bud --layers --arch arm64 -f Containerfile -t "${IMAGE_URI}" .
            if ! buildah push "${IMAGE_URI}"; then
              if aws ecr describe-images --repository-name "${ECR_REPOSITORY}" \
                --image-ids imageTag="${IMAGE_TAG}" \
                --region "${{ secrets.AWS_REGION }}" >/dev/null 2>&1; then
                echo "Image was concurrently created by another run; reuse existing tag."
              else
                echo "buildah push failed for ${IMAGE_URI}" >&2
                exit 1
              fi
            fi
          fi

          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Build CodeDeploy bundle (AI container)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.value }}"
          BUCKET="${{ secrets.S3_BUCKET }}"
          S3_PREFIX="${{ secrets.S3_PREFIX }}"

          if [[ -z "${BUCKET}" ]]; then
            echo "S3_BUCKET secret is required" >&2
            exit 1
          fi
          if [[ -z "${S3_PREFIX}" ]]; then
            S3_PREFIX="artifacts"
          fi

          rm -rf bundle
          mkdir -p bundle/deploy

          cp deploy/appspec-container.yml bundle/appspec.yml
          cp deploy/start-container.sh bundle/deploy/start-container.sh
          cp deploy/stop-container.sh bundle/deploy/stop-container.sh
          cp deploy/validate-container.sh bundle/deploy/validate-container.sh
          cp deploy/deploy-ai-container.sh bundle/deploy/deploy-ai-container.sh

          chmod +x bundle/deploy/start-container.sh bundle/deploy/stop-container.sh bundle/deploy/validate-container.sh bundle/deploy/deploy-ai-container.sh

          cat > bundle/deploy/env.sh <<EOF_ENV
          RELEASE_ID='${VERSION}'
          APP_STAGE='${APP_STAGE}'
          IMAGE_URI='${IMAGE_URI}'
          HEALTH_CHECK_URL='${HEALTH_URL}'
          EOF_ENV

          (cd bundle && zip -r ../bundle.zip .)
          unzip -l bundle.zip

          BUNDLE_KEY="${S3_PREFIX}/${APP_STAGE}/codedeploy/ai/${VERSION}/bundle-${{ github.run_id }}.zip"
          aws s3 cp bundle.zip "s3://$BUCKET/$BUNDLE_KEY"
          echo "BUCKET=$BUCKET" >> "$GITHUB_ENV"
          echo "BUNDLE_KEY=$BUNDLE_KEY" >> "$GITHUB_ENV"

      - name: Create CodeDeploy deployment & wait
        shell: bash
        run: |
          set -euo pipefail
          APP="${{ secrets.CODEDEPLOY_APP_AI_DEV }}"
          DG="${{ secrets.CODEDEPLOY_DG_AI_DEV }}"
          : "${BUCKET:?S3 bucket is required (set S3_BUCKET secret)}"
          : "${BUNDLE_KEY:?BUNDLE_KEY is required}"
          echo "BUCKET=$BUCKET"
          echo "BUNDLE_KEY=$BUNDLE_KEY"

          DEPLOY_ID="$(aws deploy create-deployment \
            --application-name "$APP" \
            --deployment-group-name "$DG" \
            --s3-location bucket="$BUCKET",key="$BUNDLE_KEY",bundleType=zip \
            --file-exists-behavior OVERWRITE \
            --query "deploymentId" --output text)"

          echo "deploymentId=$DEPLOY_ID"
          aws deploy wait deployment-successful --deployment-id "$DEPLOY_ID"
          echo "CodeDeploy SUCCESS"

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          MESSAGE="AI Dev CD 실패
          Repo: \`${{ github.repository }}\`
          Branch: \`${{ github.ref_name }}\`
          Workflow: \`${{ github.workflow }}\`
          Job: \`${{ github.job }}\`
          Author: \`${{ github.actor }}\`
          Stage: \`${APP_STAGE}\`
          링크: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          JSON_MESSAGE=$(printf '%s\n' "$MESSAGE" | python3 -c 'import json,sys; print(json.dumps({"content": sys.stdin.read()}))')
          curl -X POST -H "Content-Type: application/json" -d "$JSON_MESSAGE" "$DISCORD_WEBHOOK_URL"
